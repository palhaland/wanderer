version: '3'

services:
  search:
    image: getmeili/meilisearch:v1.11.3
    environment:
      MEILI_URL: http://search:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped
    healthcheck:
      test: curl --fail http://localhost:7700/health || exit 1
      interval: 15s
      retries: 10
      start_period: 20s
      timeout: 10s
  db:
    image: ghcr.io/open-wanderer/wanderer-db:dev
    depends_on:
      search:
        condition: service_healthy
    environment:
      MEILI_URL: http://search:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?}
      POCKETBASE_ENCRYPTION_KEY: ${POCKETBASE_ENCRYPTION_KEY:?}
      ORIGIN: ${ORIGIN:?}
    restart: unless-stopped
    volumes:
      - pb_data:/pb_data
    healthcheck:
      test: ["CMD", "/curl", "--fail", "http://localhost:8090/health"]
      interval: 15s
      retries: 10
      start_period: 20s
      timeout: 10s
  web:
    build: ../web
    image: ghcr.io/open-wanderer/wanderer-web:dev
    depends_on:
      search:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      MEILI_URL: http://search:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?}
      ORIGIN: ${ORIGIN:?}
      BODY_SIZE_LIMIT: Infinity
      PUBLIC_POCKETBASE_URL: http://db:8090
      PUBLIC_DISABLE_SIGNUP: "false"
      UPLOAD_FOLDER: /app/uploads
      UPLOAD_USER:
      UPLOAD_PASSWORD:
      OVERPASS_API_URL: https://overpass-api.de
      VALHALLA_URL: https://valhalla1.openstreetmap.de
      NOMINATIM_URL: https://nominatim.openstreetmap.org
      PUBLIC_MAP_LOW_ZOOM_THRESHOLD: 8
      PUBLIC_MAP_LOW_ZOOM_DIAGONAL_LIMIT: 25000
      PUBLIC_MAP_MEDIUM_ZOOM_THRESHOLD: 10
      PUBLIC_MAP_MEDIUM_ZOOM_DIAGONAL_LIMIT: 10000
      PUBLIC_MAP_HIGH_ZOOM_THRESHOLD: 12
      PUBLIC_MAP_HIGH_ZOOM_DIAGONAL_LIMIT: 5000
    volumes:
      - uploads:/app/uploads
      # - ./data/about.md:/app/build/client/md/about.md
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/curl", "--fail", "http://localhost:3000/"]
      interval: 15s
      retries: 10
      start_period: 20s
      timeout: 10s

volumes:
  meili_data:
  pb_data:
  uploads:
